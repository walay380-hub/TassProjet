<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | LEADER ALUMINIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            display: flex;
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .auth-box {
            flex: 1;
            background: white;
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
        }
        .auth-title {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--secondary);
            font-size: 1.5rem;
        }
        @media (max-width: 768px) {
            .auth-container { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">LEADER <span>ALUMINIUM</span></a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="catalog.html">Products</a>
                <a href="contact.html">Contact</a>
                <a href="login.html" class="auth-link"><i class="fas fa-user"></i> Login</a>
            </nav>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
                <button class="mobile-menu-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mt-5 mb-5 pt-4">
        <div class="auth-container">
            
            <!-- Login Form -->
            <div class="auth-box">
                <h2 class="auth-title">Welcome Back</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="login-email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="login-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-secondary w-full" style="width: 100%;">Sign In</button>
                </form>
            </div>

            <!-- Register Form -->
            <div class="auth-box">
                <h2 class="auth-title">Create Account</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="reg-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="reg-email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="reg-phone" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Address</label>
                        <input type="text" id="reg-address" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full" style="width: 100%;">Register</button>
                </form>
            </div>

        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 LEADER ALUMINIUM. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (currentUser) {
                window.location.href = 'profile.html';
                return;
            }

            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                // Simulate login
                const email = document.getElementById('login-email').value;
                const user = {
                    name: email.split('@')[0],
                    email: email,
                    history: []
                };
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'profile.html';
            });

            document.getElementById('register-form').addEventListener('submit', (e) => {
                e.preventDefault();
                // Simulate registration
                const user = {
                    name: document.getElementById('reg-name').value,
                    email: document.getElementById('reg-email').value,
                    phone: document.getElementById('reg-phone').value,
                    address: document.getElementById('reg-address').value,
                    history: []
                };
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'profile.html';
            });
        });
    </script>
</body>
</html>
