<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Profile | LEADER ALUMINIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            align-items: flex-start;
        }
        .profile-sidebar {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem;
        }
        .profile-nav button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 1rem;
            background: none;
            border: none;
            border-bottom: 1px solid #eee;
            font-size: 1rem;
            color: #555;
            cursor: pointer;
            transition: var(--transition);
        }
        .profile-nav button:hover, .profile-nav button.active {
            color: var(--secondary);
            font-weight: 600;
            background: #f9f9f9;
        }
        .profile-nav button:last-child {
            border-bottom: none;
        }
        .profile-content {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            padding: 2rem;
            min-height: 400px;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .order-card {
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .order-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #e2e3e5;
            color: #383d41;
        }
        @media (max-width: 768px) {
            .profile-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">LEADER <span>ALUMINIUM</span></a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="catalog.html">Products</a>
                <a href="contact.html">Contact</a>
                <a href="profile.html" class="auth-link"><i class="fas fa-user"></i> Profile</a>
            </nav>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
                <button class="mobile-menu-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mt-5 mb-5 pt-4">
        <h1 class="mb-4">My Account</h1>
        
        <div class="profile-container">
            <div class="profile-sidebar">
                <div style="text-align: center; margin-bottom: 1.5rem;">
                    <div style="width: 80px; height: 80px; background: var(--accent); color: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1rem;">
                        <i class="fas fa-user"></i>
                    </div>
                    <h3 id="sidebar-name">User Name</h3>
                </div>
                <div class="profile-nav">
                    <button class="active" onclick="switchTab('info')"><i class="fas fa-id-card mr-2"></i> Profile Info</button>
                    <button onclick="switchTab('orders')"><i class="fas fa-box mr-2"></i> Order History</button>
                    <button onclick="logout()" style="color: #dc3545;"><i class="fas fa-sign-out-alt mr-2"></i> Logout</button>
                </div>
            </div>

            <div class="profile-content">
                <!-- Profile Info Tab -->
                <div id="tab-info" class="tab-pane active">
                    <h2 class="mb-4" style="border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem;">Personal Information</h2>
                    <form id="profile-form">
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="prof-name" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" id="prof-email" class="form-control" readonly style="background: #f4f4f4; cursor: not-allowed;">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <div class="form-group">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" id="prof-phone" class="form-control">
                            </div>
                            <div class="form-group">
                                <label class="form-label">City</label>
                                <input type="text" id="prof-city" class="form-control">
                            </div>
                        </div>
                        <div class="form-group mb-4">
                            <label class="form-label">Delivery Address</label>
                            <input type="text" id="prof-address" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <span id="save-msg" style="color: green; margin-left: 1rem; display: none;">Saved successfully!</span>
                    </form>
                </div>

                <!-- Order History Tab -->
                <div id="tab-orders" class="tab-pane">
                    <h2 class="mb-4" style="border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem;">Order History</h2>
                    <div id="orders-container">
                        <!-- Orders injected via JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 LEADER ALUMINIUM. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            // Populate Info
            document.getElementById('sidebar-name').textContent = currentUser.name;
            document.getElementById('prof-name').value = currentUser.name || '';
            document.getElementById('prof-email').value = currentUser.email || '';
            document.getElementById('prof-phone').value = currentUser.phone || '';
            document.getElementById('prof-address').value = currentUser.address || '';
            document.getElementById('prof-city').value = currentUser.city || '';

            // Handle Profile Update
            document.getElementById('profile-form').addEventListener('submit', (e) => {
                e.preventDefault();
                currentUser.name = document.getElementById('prof-name').value;
                currentUser.phone = document.getElementById('prof-phone').value;
                currentUser.address = document.getElementById('prof-address').value;
                currentUser.city = document.getElementById('prof-city').value;
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('sidebar-name').textContent = currentUser.name;
                
                const msg = document.getElementById('save-msg');
                msg.style.display = 'inline';
                setTimeout(() => msg.style.display = 'none', 3000);
            });

            // Render Orders
            renderOrders();
        });

        function switchTab(tabId) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.profile-nav button').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function renderOrders() {
            const container = document.getElementById('orders-container');
            const history = currentUser.history || [];
            
            if (history.length === 0) {
                container.innerHTML = `<p style="color: #666; font-style: italic;">You haven't placed any orders yet.</p>`;
                return;
            }

            let html = '';
            // Reverse to show newest first
            [...history].reverse().forEach(order => {
                let itemsHtml = order.items.map(item => `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.95rem;">
                        <span>${item.quantity}x ${item.name}</span>
                        <span>${(item.price * item.quantity).toFixed(2)} TND</span>
                    </div>
                `).join('');

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <h3 style="margin-bottom: 0.25rem;">Order #${order.id}</h3>
                                <span style="color: #666; font-size: 0.9rem;">Placed on ${order.date}</span>
                            </div>
                            <div style="text-align: right;">
                                <div class="order-status">${order.status}</div>
                                <div style="font-weight: 700; margin-top: 0.5rem; color: var(--primary-dark);">${order.total.toFixed(2)} TND</div>
                            </div>
                        </div>
                        <div style="background: #fcfcfc; padding: 1rem; border-radius: 5px;">
                            <h4 style="font-size: 0.9rem; color: #666; margin-bottom: 0.5rem; text-transform: uppercase;">Items</h4>
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
